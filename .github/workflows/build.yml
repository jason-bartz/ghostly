name: "Build"

on:
  workflow_call:
    inputs:
      platform:
        required: true
        type: string
      target:
        required: true
        type: string
      build-args:
        required: false
        type: string
        default: ""
      release-id:
        required: false
        type: string
      asset-prefix:
        required: false
        type: string
        default: "ghostly"
      asset-name-pattern:
        required: false
        type: string
        default: ""
      upload-artifacts:
        required: false
        type: boolean
        default: false
      sign-binaries:
        required: false
        type: boolean
        default: false
      repository:
        required: false
        type: string
      ref:
        required: false
        type: string
        default: ${{ github.ref }}
      is-debug-build:
        required: false
        type: boolean
        default: false

jobs:
  build:
    permissions:
      contents: write
    runs-on: ${{ inputs.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.repository }}
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Get version from tauri.conf.json
        id: get-version
        shell: bash
        run: |
          VERSION=$(grep -o '"version": "[^"]*"' src-tauri/tauri.conf.json | cut -d'"' -f4)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Determine build profile
        id: build-profile
        shell: bash
        run: |
          if [[ "${{ inputs.is-debug-build }}" == "true" ]]; then
            echo "profile=debug" >> "$GITHUB_OUTPUT"
          else
            echo "profile=release" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          key: ${{ inputs.platform }}-${{ inputs.target }}

      - name: install frontend dependencies
        run: bun install

      - name: rustup install target
        if: ${{ inputs.target != '' }}
        run: rustup target add ${{ inputs.target }}

      - name: import Apple Developer Certificate
        if: inputs.sign-binaries
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo $APPLE_CERTIFICATE | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          security find-identity -v -p codesigning build.keychain

      - name: verify certificate
        if: inputs.sign-binaries
        run: |
          CERT_INFO=$(security find-identity -v -p codesigning build.keychain | grep "Developer ID Application")
          CERT_ID=$(echo "$CERT_INFO" | awk -F'"' '{print $2}')
          echo "CERT_ID=$CERT_ID" >> $GITHUB_ENV

      - name: Patch asset name pattern
        id: patch-release-name
        shell: bash
        if: ${{ inputs.release-id != '' && inputs.asset-name-pattern != '' }}
        run: |
          platform="${{ inputs.platform }}"
          replacement="$(echo ${platform} | sed -E 's/-latest//')"
          patched_platform=$(echo '${{ inputs.asset-name-pattern }}' | sed -E "s/\[platform\]/${replacement}/")
          if [[ -n "${{ inputs.asset-prefix }}" ]]; then
            patched_platform="${{ inputs.asset-prefix }}_${patched_platform}"
          fi
          echo "platform=${patched_platform}" >> $GITHUB_OUTPUT

      - name: Install ONNX Runtime (x86_64 macOS)
        if: inputs.target == 'x86_64-apple-darwin'
        shell: bash
        run: |
          ORT_VERSION="1.24.2"
          curl -L -o ort.tgz "https://blob.handy.computer/onnxruntime-osx-x86_64-${ORT_VERSION}.tgz"
          tar xzf ort.tgz
          ORT_DIR="$(pwd)/onnxruntime-osx-x86_64-${ORT_VERSION}"
          echo "ORT_LIB_LOCATION=$ORT_DIR/lib" >> $GITHUB_ENV
          echo "ORT_PREFER_DYNAMIC_LINK=1" >> $GITHUB_ENV
          jq --arg lib "$ORT_DIR/lib/libonnxruntime.${ORT_VERSION}.dylib" \
            '.bundle.macOS.frameworks = [$lib]' \
            src-tauri/tauri.conf.json > tmp.json && mv tmp.json src-tauri/tauri.conf.json

      - name: Build with Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ inputs.sign-binaries && secrets.APPLE_ID || '' }}
          APPLE_ID_PASSWORD: ${{ inputs.sign-binaries && secrets.APPLE_ID_PASSWORD || '' }}
          APPLE_PASSWORD: ${{ inputs.sign-binaries && secrets.APPLE_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ inputs.sign-binaries && secrets.APPLE_TEAM_ID || '' }}
          APPLE_CERTIFICATE: ${{ inputs.sign-binaries && secrets.APPLE_CERTIFICATE || '' }}
          APPLE_CERTIFICATE_PASSWORD: ${{ inputs.sign-binaries && secrets.APPLE_CERTIFICATE_PASSWORD || '' }}
          APPLE_SIGNING_IDENTITY: ${{ inputs.sign-binaries && env.CERT_ID || '' }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ inputs.sign-binaries && secrets.TAURI_SIGNING_PRIVATE_KEY || '' }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ inputs.sign-binaries && secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD || '' }}
        with:
          tagName: ${{ inputs.release-id && format('v{0}', steps.get-version.outputs.version) || '' }}
          releaseName: ${{ inputs.release-id && format('v{0}', steps.get-version.outputs.version) || '' }}
          releaseId: ${{ inputs.release-id }}
          assetNamePattern: ${{ steps.patch-release-name.outputs.platform }}
          args: ${{ inputs.build-args }}

      - name: Verify macOS dylib bundling
        if: inputs.target == 'x86_64-apple-darwin'
        shell: bash
        run: |
          APP=$(find src-tauri/target -name "*.app" -type d | head -1)
          otool -L "$APP/Contents/MacOS/ghostly" | grep '@rpath/' | awk '{print $1}' | while read dep; do
            libname=$(basename "$dep")
            if [ ! -f "$APP/Contents/Frameworks/$libname" ]; then
              echo "MISSING: $libname not found in Frameworks/"
              exit 1
            fi
          done

      - name: Upload DMG to Cloudflare R2
        if: inputs.sign-binaries && inputs.target == 'aarch64-apple-darwin' && inputs.release-id
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          DMG=$(find src-tauri/target -name "*.dmg" -type f | head -1)
          if [ -z "$DMG" ]; then
            echo "No DMG found to upload"
            exit 1
          fi
          echo "Uploading $DMG to r2://$R2_BUCKET/Ghostly-latest.dmg"
          aws s3 cp "$DMG" "s3://$R2_BUCKET/Ghostly-latest.dmg" \
            --endpoint-url "https://$R2_ACCOUNT_ID.r2.cloudflarestorage.com" \
            --content-type "application/x-apple-diskimage" \
            --cache-control "public, max-age=300"

      - name: Publish updater manifest + bundle to Cloudflare R2
        if: inputs.sign-binaries && inputs.target == 'aarch64-apple-darwin' && inputs.release-id
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.get-version.outputs.version }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          BUNDLE_DIR="src-tauri/target/aarch64-apple-darwin/release/bundle/macos"
          echo "Bundle dir listing:"
          ls -la "$BUNDLE_DIR" || true
          echo "---"

          TARBALL=$(find src-tauri/target -name "*.app.tar.gz" -type f | head -1)
          if [ -z "$TARBALL" ]; then
            echo "Tarball not found under src-tauri/target"
            exit 1
          fi

          SIG=$(find src-tauri/target -name "*.app.tar.gz.sig" -type f | head -1)
          if [ -z "$SIG" ]; then
            echo "Sig file missing — signing tarball with TAURI_SIGNING_PRIVATE_KEY"
            bun tauri signer sign "$TARBALL"
            SIG="${TARBALL}.sig"
            if [ ! -f "$SIG" ]; then
              echo "Signing failed; no .sig produced at $SIG"
              exit 1
            fi
          fi
          SIG_CONTENTS=$(cat "$SIG")
          ENDPOINT="https://$R2_ACCOUNT_ID.r2.cloudflarestorage.com"

          VERSIONED_KEY="releases/v${VERSION}/Ghostly-darwin-aarch64.app.tar.gz"
          LATEST_KEY="Ghostly-darwin-aarch64.app.tar.gz"

          echo "Uploading versioned bundle: s3://$R2_BUCKET/$VERSIONED_KEY"
          aws s3 cp "$TARBALL" "s3://$R2_BUCKET/$VERSIONED_KEY" \
            --endpoint-url "$ENDPOINT" \
            --content-type "application/gzip" \
            --cache-control "public, max-age=31536000, immutable"

          echo "Uploading latest alias: s3://$R2_BUCKET/$LATEST_KEY"
          aws s3 cp "$TARBALL" "s3://$R2_BUCKET/$LATEST_KEY" \
            --endpoint-url "$ENDPOINT" \
            --content-type "application/gzip" \
            --cache-control "public, max-age=300"

          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          NOTES=$(gh release view "v${VERSION}" --json body -q .body 2>/dev/null || echo "")
          TARBALL_URL="https://downloads.try-ghostly.com/${VERSIONED_KEY}"

          jq -n \
            --arg version "$VERSION" \
            --arg notes "$NOTES" \
            --arg pub_date "$PUB_DATE" \
            --arg signature "$SIG_CONTENTS" \
            --arg url "$TARBALL_URL" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {
                "darwin-aarch64": {
                  signature: $signature,
                  url: $url
                }
              }
            }' > updates.json

          echo "Manifest contents:"
          cat updates.json

          echo "Uploading manifest: s3://$R2_BUCKET/updates.json"
          aws s3 cp updates.json "s3://$R2_BUCKET/updates.json" \
            --endpoint-url "$ENDPOINT" \
            --content-type "application/json" \
            --cache-control "public, max-age=60"

      - name: Sync version on try-ghostly landing page
        if: inputs.sign-binaries && inputs.target == 'aarch64-apple-darwin' && inputs.release-id
        shell: bash
        env:
          TRY_GHOSTLY_PAT: ${{ secrets.TRY_GHOSTLY_PAT }}
        run: |
          if [ -z "$TRY_GHOSTLY_PAT" ]; then
            echo "TRY_GHOSTLY_PAT not set — skipping landing page sync"
            exit 0
          fi
          APP_VERSION=$(grep -o '"version": "[^"]*"' src-tauri/tauri.conf.json | head -1 | cut -d'"' -f4)
          if [ -z "$APP_VERSION" ]; then
            echo "Could not read version from tauri.conf.json"
            exit 1
          fi
          WORKDIR=$(mktemp -d)
          git clone --depth=1 "https://x-access-token:${TRY_GHOSTLY_PAT}@github.com/jason-bartz/try-ghostly.git" "$WORKDIR"
          cd "$WORKDIR"
          MONTH_YEAR=$(date -u +"%b %Y")
          sed -i.bak -E 's|("softwareVersion": ")[^"]+(")|\1'"$APP_VERSION"'\2|' index.html
          sed -i.bak -E 's|(id="footer-version">)v[0-9]+\.[0-9]+\.[0-9]+ · updated [A-Za-z]+ [0-9]{4}|\1v'"$APP_VERSION"' · updated '"$MONTH_YEAR"'|g' index.html install/index.html
          rm -f index.html.bak install/index.html.bak
          if git diff --quiet; then
            echo "Landing page already on v$APP_VERSION — nothing to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html install/index.html
          git commit -m "chore: bump displayed version to $APP_VERSION"
          git push origin main

      - name: Upload artifacts
        if: inputs.upload-artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.asset-prefix }}-${{ inputs.target }}
          path: |
            src-tauri/target/${{ inputs.target }}/${{ steps.build-profile.outputs.profile }}/bundle/dmg/*.dmg
            src-tauri/target/${{ inputs.target }}/${{ steps.build-profile.outputs.profile }}/bundle/macos/*.app
          retention-days: 30
